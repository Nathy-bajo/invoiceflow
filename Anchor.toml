[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
invoiceflow = "DYkNRoH7goicxXzttxEALr6eRGp5EMkRxxpHQGYt3pAQ"

[programs.devnet]
invoiceflow = "DYkNRoH7goicxXzttxEALr6eRGp5EMkRxxpHQGYt3pAQ"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

# Tests create a fresh mint on the local validator, so no devnet cloning.

