name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-3.1.14

      - name: Install Solana CLI
        run: |
          if ! command -v solana >/dev/null; then
            sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor 0.31.1
        run: |
          cargo install --git https://github.com/coral-xyz/anchor anchor-cli --tag v0.31.1 --locked --force
          anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS deps
        run: npm install

      - name: Generate test keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test --skip-build

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: anchor
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps (workspace root)
        run: npm install

      - name: Restore Anchor build artifacts
        # We need the IDL + types from the anchor job. Easiest: rebuild.
        # In a real org, persist the target/ directory between jobs via cache.
        run: |
          # Stub IDL so the frontend build doesn't fail when Anchor artifacts
          # aren't present. The real IDL is generated by `anchor build` and
          # synced via `npm run sync-idl` before deploy.
          mkdir -p target/idl target/types
          if [ ! -f target/idl/invoiceflow.json ]; then
            echo '{"address":"DYkNRoH7goicxXzttxEALr6eRGp5EMkRxxpHQGYt3pAQ","metadata":{"name":"invoiceflow","version":"0.1.0","spec":"0.1.0"},"instructions":[],"accounts":[],"types":[]}' > target/idl/invoiceflow.json
            echo 'export type Invoiceflow = any; export const IDL: any = {};' > target/types/invoiceflow.ts
          fi

      - name: Frontend install + build
        working-directory: app
        run: |
          npm install
          mkdir -p src/idl
          cp ../target/idl/invoiceflow.json src/idl/invoiceflow.json
          cp ../target/types/invoiceflow.ts src/idl/invoiceflow.ts
          npm run build
