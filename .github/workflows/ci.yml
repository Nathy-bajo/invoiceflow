name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Solana CLI
        uses: actions/cache@v4
        with:
          path: ~/.local/share/solana
          key: ${{ runner.os }}-solana-3.1.14

      - name: Install Solana CLI
        run: |
          if ! command -v solana >/dev/null; then
            sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.14/install)"
          fi
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor 0.31.1
        run: |
          if ! command -v anchor >/dev/null; then
            cargo install --git https://github.com/coral-xyz/anchor anchor-cli --tag v0.31.1 --locked --force
          fi
          anchor --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install JS deps
        run: npm install

      - name: Generate test keypair
        run: |
          mkdir -p ~/.config/solana
          solana-keygen new --no-bip39-passphrase -o ~/.config/solana/id.json --force

      - name: Anchor build
        run: anchor build

      - name: Anchor test
        run: anchor test --skip-build

      - name: Upload IDL + types as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anchor-artifacts
          path: |
            target/idl/invoiceflow.json
            target/types/invoiceflow.ts
          retention-days: 1

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: anchor
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download Anchor artifacts (real IDL + types)
        uses: actions/download-artifact@v4
        with:
          name: anchor-artifacts
          path: target

      - name: Frontend install + build
        working-directory: app
        run: |
          npm install
          mkdir -p src/idl
          cp ../target/idl/invoiceflow.json src/idl/invoiceflow.json
          cp ../target/types/invoiceflow.ts src/idl/invoiceflow.ts
          npm run build
